name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: hermes-flake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: nix flake check
        run: nix flake check --no-build

      - name: build hermes-agent (base)
        run: nix build .#hermes-agent --print-build-logs

      - name: smoke test
        run: |
          ./result/bin/hermes --version
          ./result/bin/hermes --help > /dev/null

      - name: build hermes-agent-full (best-effort)
        continue-on-error: true
        run: nix build .#hermes-agent-full --print-build-logs
