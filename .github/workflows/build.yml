name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ matrix.system }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ matrix.system }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ matrix.system }}-
          purge-created: 0
          purge-primary-key: never

      - name: nix flake check (eval only — fast)
        run: nix flake check --no-build

      - name: lint (alejandra/statix/deadnix)
        run: nix build .#checks.${{ matrix.system }}.lint --print-build-logs

      - name: smoke (base)
        run: nix build .#checks.${{ matrix.system }}.smoke --print-build-logs

      - name: config-yaml-schema
        run: nix build .#checks.${{ matrix.system }}.config-yaml-schema --print-build-logs

      - name: config-yaml-override
        run: nix build .#checks.${{ matrix.system }}.config-yaml-override --print-build-logs

      - name: closure-size guard
        run: nix build .#checks.${{ matrix.system }}.closure-size --print-build-logs

      - name: build hermes-agent (base)
        run: nix build .#hermes-agent --print-build-logs

      - name: build with extras = [voice, anthropic, mcp]
        run: |
          nix build --impure --print-build-logs --expr \
            '(builtins.getFlake (toString ./.)).packages.${{ matrix.system }}.hermes-agent.withExtras [ "voice" "anthropic" "mcp" ]'

      - name: build hermes-agent-full (best-effort — DingTalk + Feishu may fail)
        id: smoke_full
        continue-on-error: true
        run: nix build .#checks.${{ matrix.system }}.smoke-full --print-build-logs

      - name: NixOS VM module test (best-effort)
        id: vm_module
        continue-on-error: true
        if: matrix.system == 'x86_64-linux'
        run: nix build .#checks.${{ matrix.system }}.nixos-module --print-build-logs

      - name: Required/advisory check summary
        if: always()
        run: |
          {
            echo "## Hermes build summary (${{ matrix.system }})"
            echo
            echo "### Required"
            echo "- nix flake check --no-build"
            echo "- lint"
            echo "- base smoke"
            echo "- config schema"
            echo "- config override"
            echo "- closure-size guard"
            echo "- base hermes-agent build"
            echo "- selected extras build: voice, anthropic, mcp"
            echo
            echo "### Advisory"
            echo "- hermes-agent-full: \`${{ steps.smoke_full.outcome }}\`"
            if [ "${{ matrix.system }}" = "x86_64-linux" ]; then
              echo "- NixOS VM module test: \`${{ steps.vm_module.outcome }}\`"
            else
              echo "- NixOS VM module test: \`skipped\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  flakehub-publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3

      - uses: DeterminateSystems/flakehub-push@0e801cf490b3b3dcb099131a69146bc59d610d0f # main, pinned 2026-06-30
        with:
          name: ErikBPF/hermes-flake
          rolling: true
          # The 0.1 lane contains stale higher revCount releases; keep
          # wildcard consumers on current main with a higher rolling lane.
          rolling-minor: 2
          visibility: public

  flakehub-verify:
    runs-on: ubuntu-latest
    needs: flakehub-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3

      - name: FlakeHub wildcard resolves to this commit
        run: |
          set -euo pipefail
          metadata="$(nix flake metadata --refresh 'https://flakehub.com/f/ErikBPF/hermes-flake/*' --json)"
          revision="$(printf '%s\n' "$metadata" | python3 -c 'import json,sys; print(json.load(sys.stdin)["revision"])')"
          if [ "$revision" != "$GITHUB_SHA" ]; then
            printf 'FlakeHub wildcard resolved %s, expected %s\n' "$revision" "$GITHUB_SHA" >&2
            exit 1
          fi
