name: Update Hermes Agent Version

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          output="$(./scripts/update-version.sh --check 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          current=$(printf '%s\n' "$output" | sed -n 's/.*Current pin: *//p' | tail -1)
          latest=$(printf '%s\n' "$output" | sed -n 's/.*Latest upstream: *//p' | tail -1)
          release=$(printf '%s\n' "$output" | sed -n 's/.*Release URL: *//p' | tail -1)
          published=$(printf '%s\n' "$output" | sed -n 's/.*Published at: *//p' | tail -1)
          notes=$(gh api "repos/NousResearch/hermes-agent/releases/tags/$latest" --jq '.body // ""' | head -c 3500)
          {
            echo "current=$current"
            echo "latest=$latest"
            echo "release=$release"
            echo "published=$published"
            echo "notes<<EOF"
            printf '%s\n' "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            echo "update_needed=false"
          elif [ "$status" -eq 1 ]; then
            echo "update_needed=true"
          else
            exit "$status"
          fi >> "$GITHUB_OUTPUT"

      - name: Apply update
        if: steps.check.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-version.sh --version "${{ steps.check.outputs.latest }}"

      - name: Create pull request
        if: steps.check.outputs.update_needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        env:
          CURRENT: ${{ steps.check.outputs.current }}
          LATEST: ${{ steps.check.outputs.latest }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump hermes-agent to ${{ steps.check.outputs.latest }}"
          title: "chore: bump hermes-agent ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}"
          body: |
            ## Automated hermes-agent bump

            Updates the `hermes-agent-src` flake input from `${{ steps.check.outputs.current }}` to `${{ steps.check.outputs.latest }}`.

            Upstream release: ${{ steps.check.outputs.release }}
            Published: `${{ steps.check.outputs.published }}`

            ### Upstream notes excerpt
            ${{ steps.check.outputs.notes }}

            ### Verified
            - `nix build .#hermes-agent` succeeds locally in the workflow runner.
            - Smoke check (`checks.<system>.smoke`) runs as part of CI on this PR.

            ### Review-worthy if
            - The upstream release notes mention a config/env schema change — eyeball `docs/ENV_VARS.md` and `config.yaml.nix`.
            - C-extension deps changed — `overrides.nix` may need an update.

            *This PR was generated automatically by `.github/workflows/update-hermes-agent.yml`.*
          branch: update-hermes-agent-${{ steps.check.outputs.latest }}
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable auto-merge
        if: steps.check.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash --delete-branch

      - name: Summary
        if: always()
        env:
          CURRENT: ${{ steps.check.outputs.current }}
          LATEST: ${{ steps.check.outputs.latest }}
          NEEDED: ${{ steps.check.outputs.update_needed }}
        run: |
          {
            echo "## Update summary"
            echo
            if [ "$NEEDED" = "true" ]; then
              echo "- Current: \`$CURRENT\`"
              echo "- Latest:  \`$LATEST\`"
              echo "- Release: ${{ steps.check.outputs.release }}"
              echo
              echo "Pull request created."
            else
              current=$(sed -n 's|.*github:NousResearch/hermes-agent/\([^"]*\)".*|\1|p' flake.nix | head -1)
              echo "- Pinned at \`$current\` — already up to date."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
