name: Auto-tag hermes-agent bumps

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Extract packaged upstream version and push tag
        run: |
          set -euo pipefail
          tag=$(sed -n 's|.*github:NousResearch/hermes-agent/\([^"]*\)".*|\1|p' flake.nix | head -1)
          if ! printf '%s\n' "$tag" | grep -Eq '^v[0-9]{4}\.[0-9]+\.[0-9]+$'; then
            echo "current hermes-agent pin is not a release tag: $tag" >&2
            exit 0
          fi
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping" >&2
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$tag" -m "hermes-agent $tag"
          git push origin "refs/tags/$tag"
