name: Auto-tag hermes-agent bumps

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    if: "${{ startsWith(github.event.head_commit.message, 'chore: bump hermes-agent to v') }}"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Extract version and push tag
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          # Strict parse: first line must match `chore: bump hermes-agent to vX.Y.Z`
          first_line=$(printf '%s\n' "$COMMIT_MSG" | head -n1)
          tag=$(printf '%s\n' "$first_line" | sed -n 's|^chore: bump hermes-agent to \(v[0-9][0-9.]*\)$|\1|p')
          if [ -z "$tag" ]; then
            echo "commit message did not match expected pattern; skipping" >&2
            exit 0
          fi
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping" >&2
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$tag" -m "hermes-agent $tag"
          git push origin "refs/tags/$tag"
